name: Deploy to Server

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/huwa
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            rm -rf node_modules
            npm ci
            mkdir -p backups
            if [ -f prisma/dev.db ]; then
              cp prisma/dev.db "backups/dev.db.$(date +%Y%m%d-%H%M%S)"
              find backups -type f -name 'dev.db.*' -mtime +30 -delete
            fi
            npx prisma db push --skip-generate
            npm run operations:backfill
            npm run seo:backfill
            rm -rf .next
            npm run build
            pm2 restart huwa-web
            echo "✅ Deployment erfolgreich: $(date)"
