name: Deploy to Server

on:
  push:
    branches:
      - claude/huwa-cleaning-website-PJ5Ql
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/huwa
            git fetch origin
            git checkout claude/huwa-cleaning-website-PJ5Ql
            git reset --hard origin/claude/huwa-cleaning-website-PJ5Ql
            git clean -fd
            npm ci
            npx prisma db push --skip-generate
            rm -rf .next
            npm run build
            pm2 restart huwa-web
            sleep 8
            echo "--- PM2 Status ---"
            pm2 status
            echo "--- PM2 Logs (letzte 30 Zeilen) ---"
            pm2 logs huwa-web --lines 30 --nostream || true
            echo "✅ Deployment erfolgreich: $(date)"
